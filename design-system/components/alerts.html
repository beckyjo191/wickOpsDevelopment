<!-- @dsCard group="Components" name="Alert cards" subtitle="danger / warning / caution / info" -->
<!DOCTYPE html>
<meta charset="utf-8">
<title>Alert cards</title>
<style>
:root{--primary:#2563EB;--danger:#DC2626;--danger-border:#FCA5A5;--danger-surface:#FEF2F2;--warning:#EA580C;--warning-border:#FDBA74;--warning-surface:#FFF7ED;--caution:#EAB308;--caution-border:#FDE047;--caution-surface:#FEFCE8;--surface-alt:#f8fafc;--surface-soft:#eff6ff;--border:#CBD5E1;--text-muted:#475569;--radius-lg:8px}
[data-theme="dark"]{--primary:#2563EB;--danger:#FCA5A5;--danger-surface:#2D1515;--danger-border:#7F1D1D;--warning:#FB923C;--warning-surface:#1C0E04;--warning-border:#431407;--caution:#FACC15;--caution-surface:#1A1504;--caution-border:#422006;--surface-soft:#243040;--surface-alt:#243346;--border:#2E3D52;--text-muted:#CBD5E1}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.split{display:grid;grid-template-columns:1fr 1fr}
.pane{padding:28px}.pane.light{background:#f8fafc}.pane.dark{background:#0A0F1E}
.title{margin:0 0 16px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
.stack{display:flex;flex-direction:column;gap:12px;max-width:360px}
.app-alert-card{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface-alt);font-size:.875rem;font-weight:500;text-align:left;width:100%}
.app-alert-card--danger{background:var(--danger-surface);border-color:var(--danger-border);color:var(--danger)}
.app-alert-card--warning{background:var(--warning-surface);border-color:var(--warning-border);color:var(--warning)}
.app-alert-card--caution{background:var(--caution-surface);border-color:var(--caution-border);color:var(--caution)}
.app-alert-card--info{background:var(--surface-soft);border-color:var(--primary);color:var(--primary)}
.dot{width:8px;height:8px;border-radius:999px;background:currentColor;flex:none}
</style>
<div class="split">
  <section class="pane light">
    <p class="title">Alert cards — Light</p>
    <div class="stack">
      <div class="app-alert-card app-alert-card--danger"><span class="dot"></span>3 items out of stock</div>
      <div class="app-alert-card app-alert-card--warning"><span class="dot"></span>5 items below minimum</div>
      <div class="app-alert-card app-alert-card--caution"><span class="dot"></span>2 items expiring this week</div>
      <div class="app-alert-card app-alert-card--info"><span class="dot"></span>Inventory synced 4 min ago</div>
    </div>
  </section>
  <section class="pane dark" data-theme="dark">
    <p class="title">Alert cards — Dark</p>
    <div class="stack">
      <div class="app-alert-card app-alert-card--danger"><span class="dot"></span>3 items out of stock</div>
      <div class="app-alert-card app-alert-card--warning"><span class="dot"></span>5 items below minimum</div>
      <div class="app-alert-card app-alert-card--caution"><span class="dot"></span>2 items expiring this week</div>
      <div class="app-alert-card app-alert-card--info"><span class="dot"></span>Inventory synced 4 min ago</div>
    </div>
  </section>
</div>
